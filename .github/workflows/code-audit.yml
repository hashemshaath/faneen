name: Code Quality & Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    name: Code Quality & Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript Check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: ESLint Check
        run: npx eslint src --ext .ts,.tsx --max-warnings 50
        continue-on-error: true

      - name: Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secret keys in code
        run: |
          echo "Checking for hardcoded secrets..."

          if grep -r "service_role" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "CRITICAL: service_role key found in source code!"
            exit 1
          else
            echo "OK: No service_role keys in source code"
          fi

          if grep -r "sk-[a-zA-Z0-9]" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "CRITICAL: Possible OpenAI API key found in source code!"
            exit 1
          else
            echo "OK: No OpenAI keys in source code"
          fi

          echo "Secret check passed"

      - name: Bundle Size Check
        run: |
          npm run build
          echo "Build completed successfully"
          du -sh dist/ 2>/dev/null || echo "No dist folder found"
