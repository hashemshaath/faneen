name: Code Quality & Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    name: Code Quality & Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript Check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: ESLint Check
        run: npx eslint src --ext .ts,.tsx --max-warnings 50
        continue-on-error: true

      - name: Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for .env in git
        run: |
          if git ls-files | grep -q "^\.env$"; then
            echo "CRITICAL: .env file is tracked by git!"
            exit 1
          else
            echo "OK: .env file is not tracked by git"
          fi

      - name: Bundle Size Check
        run: |
          npm run build
          echo "Build completed successfully"
          du -sh dist/ 2>/dev/null || echo "No dist folder found"
