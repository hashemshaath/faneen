name: Code Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Code Quality & Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1. ESLint
      - name: ESLint check
        run: npx eslint . --format compact
        continue-on-error: true

      # 2. TypeScript type checking
      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      # 3. Security audit
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # 4. Bundle size analysis
      - name: Build & analyze bundle
        run: |
          npx vite build 2>&1 | tee /tmp/build-output.txt
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/build-output.txt | grep -E '(dist/|\.js|\.css|kB|Total)' >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
